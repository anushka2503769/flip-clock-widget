<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flip Clock</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="clock">

  <div class="group" id="hours">
    <div class="digit" id="h1"></div>
    <div class="digit" id="h2"></div>
  </div>

  <div class="group" id="minutes">
    <div class="digit" id="m1"></div>
    <div class="digit" id="m2"></div>
  </div>

</div>

<div class="digit">

  <div class="upper">
    <span>1</span>
  </div>

  <div class="lower">
    <span>1</span>
  </div>

  <div class="flip-upper">
    <span>1</span>
  </div>

  <div class="flip-lower">
    <span>2</span>
  </div>

</div>

<div id="ampm">PM</div>

<script src="script.js"></script>

</body>
</html>
