<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Notion Flip Clock</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap"
rel="stylesheet"
/>

<link rel="stylesheet" href="style.css" />
</head>

<body>

<div id="clock">

  <div class="panel hour">
    <div class="label" id="ampm">AM</div>

    <div class="flip-card">
      <div class="top">
        <span id="hour-top">12</span>
      </div>
      <div class="bottom">
        <span id="hour-bottom">12</span>
      </div>      
      <div class="flip">
        <span id="hour-flip">12</span>
      </div>
    </div>
  </div>

  <div class="panel minute">

    <div class="flip-card">
      <div class="top">
        <span id="hour-top">12</span>
      </div>      
      <div class="bottom">
        <span id="hour-bottom">12</span>
      </div>
      <div class="flip">
        <span id="hour-flip">12</span>
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
